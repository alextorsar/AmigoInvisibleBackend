name: Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  ci-checks:
    name: Run Linter, Formatter, and Integration Tests
    runs-on: ubuntu-latest

    services:
      # Ephemeral Database Service Container
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: secret_santa_test
        ports:
          - 5432:5432
        # Ensure Postgres is ready before starting the job steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Ephemeral Mailpit Service Container
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Code Formatter Check
        run: ruff format --check .

      - name: Run Ruff Linter Check
        run: ruff check .

      - name: Run Automated Tests (Pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/secret_santa_test
          SMTP_HOST: localhost
          SMTP_HOST_PORT: 1025
          SMTP_FROM_EMAIL: noreply@secretsanta.local
          APP_ENV: testing
        run: |
          # Once Alembic migrations are set up, we will run them here:
          # alembic upgrade head
          pytest -v
